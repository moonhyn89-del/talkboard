<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>톡톡 담다</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif; background: #f7f5f2; color: #1a1a1a; min-height: 100vh; }

  .header { background: #fff; border-bottom: 1px solid #e8e4de; padding: 1.2rem 1.5rem; display: flex; align-items: center; justify-content: space-between; }
  .header h1 { font-size: 1.1rem; font-weight: 600; letter-spacing: -0.02em; }
  .header span { font-size: 0.75rem; color: #999; }

  .container { max-width: 680px; margin: 0 auto; padding: 1.5rem 1rem; }

  .write-btn { width: 100%; background: #2d2d2d; color: #fff; border: none; border-radius: 10px; padding: 0.85rem; font-size: 0.95rem; font-weight: 500; cursor: pointer; margin-bottom: 1.5rem; transition: background 0.15s; }
  .write-btn:hover { background: #444; }

  /* 글쓰기 폼 */
  .form-card { background: #fff; border-radius: 12px; border: 1px solid #e8e4de; padding: 1.25rem; margin-bottom: 1.5rem; display: none; }
  .form-card.open { display: block; }
  .form-card h2 { font-size: 0.95rem; font-weight: 600; margin-bottom: 1rem; color: #333; }
  .form-row { margin-bottom: 0.75rem; }
  .form-row label { display: block; font-size: 0.8rem; color: #666; margin-bottom: 0.3rem; }
  .form-row input, .form-row textarea { width: 100%; border: 1px solid #e0dbd3; border-radius: 8px; padding: 0.6rem 0.75rem; font-size: 0.9rem; font-family: inherit; background: #faf9f7; outline: none; transition: border-color 0.15s; }
  .form-row input:focus, .form-row textarea:focus { border-color: #aaa; background: #fff; }
  .form-row textarea { height: 120px; resize: vertical; }
  .form-hint { font-size: 0.75rem; color: #aaa; margin-top: 0.25rem; }
  .form-actions { display: flex; gap: 0.5rem; margin-top: 1rem; }
  .btn-submit { flex: 1; background: #2d2d2d; color: #fff; border: none; border-radius: 8px; padding: 0.7rem; font-size: 0.9rem; font-weight: 500; cursor: pointer; }
  .btn-cancel { background: transparent; color: #888; border: 1px solid #ddd; border-radius: 8px; padding: 0.7rem 1rem; font-size: 0.9rem; cursor: pointer; }

  /* 목록 */
  .list-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; }
  .list-header span { font-size: 0.8rem; color: #999; }
  .post-list { display: flex; flex-direction: column; gap: 0.5rem; }
  .post-item { background: #fff; border-radius: 10px; border: 1px solid #e8e4de; padding: 1rem 1.1rem; cursor: pointer; transition: border-color 0.15s; }
  .post-item:hover { border-color: #bbb; }
  .post-item-top { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.3rem; }
  .post-num { font-size: 0.75rem; color: #bbb; min-width: 1.5rem; }
  .post-secret { font-size: 0.7rem; background: #f0ede8; color: #888; border-radius: 4px; padding: 0.1rem 0.4rem; }
  .post-title { font-size: 0.95rem; font-weight: 500; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .post-meta { font-size: 0.75rem; color: #bbb; display: flex; gap: 0.75rem; }
  .has-reply { color: #7a9e7e; font-size: 0.75rem; }

  /* 글 보기 */
  .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 100; display: flex; align-items: flex-end; justify-content: center; }
  .modal { background: #fff; border-radius: 16px 16px 0 0; width: 100%; max-width: 680px; max-height: 85vh; overflow-y: auto; padding: 1.5rem; }
  .modal-handle { width: 36px; height: 4px; background: #ddd; border-radius: 2px; margin: 0 auto 1.2rem; }
  .modal h3 { font-size: 1.05rem; font-weight: 600; margin-bottom: 0.5rem; }
  .modal-meta { font-size: 0.78rem; color: #bbb; margin-bottom: 1rem; }
  .modal-body { font-size: 0.92rem; line-height: 1.7; color: #333; border-top: 1px solid #f0ede8; padding-top: 1rem; margin-bottom: 1rem; white-space: pre-wrap; }
  .reply-box { background: #f7f5f2; border-radius: 10px; padding: 1rem; margin-bottom: 1rem; }
  .reply-box .reply-label { font-size: 0.75rem; color: #7a9e7e; font-weight: 600; margin-bottom: 0.4rem; }
  .reply-box .reply-text { font-size: 0.9rem; line-height: 1.6; color: #333; white-space: pre-wrap; }
  .modal-close { width: 100%; background: transparent; border: 1px solid #e0dbd3; border-radius: 8px; padding: 0.65rem; font-size: 0.88rem; color: #888; cursor: pointer; margin-top: 0.5rem; }

  /* 비밀번호 확인 */
  .pw-prompt { background: #fff; border-radius: 16px 16px 0 0; width: 100%; max-width: 680px; padding: 1.5rem; }
  .pw-prompt h3 { font-size: 1rem; font-weight: 600; margin-bottom: 0.5rem; }
  .pw-prompt p { font-size: 0.85rem; color: #888; margin-bottom: 1rem; }
  .pw-prompt input { width: 100%; border: 1px solid #e0dbd3; border-radius: 8px; padding: 0.65rem 0.75rem; font-size: 0.9rem; margin-bottom: 0.75rem; outline: none; }
  .pw-prompt input:focus { border-color: #aaa; }
  .pw-actions { display: flex; gap: 0.5rem; }
  .btn-confirm { flex: 1; background: #2d2d2d; color: #fff; border: none; border-radius: 8px; padding: 0.7rem; font-size: 0.9rem; cursor: pointer; }
  .pw-error { font-size: 0.8rem; color: #c0392b; margin-top: -0.4rem; margin-bottom: 0.5rem; display: none; }

  /* 로딩 / 빈 상태 */
  .empty { text-align: center; padding: 3rem 0; color: #bbb; font-size: 0.9rem; }
  .loading { text-align: center; padding: 2rem 0; color: #bbb; font-size: 0.85rem; }

  .toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); background: #2d2d2d; color: #fff; padding: 0.6rem 1.2rem; border-radius: 20px; font-size: 0.85rem; z-index: 999; opacity: 0; transition: opacity 0.2s; pointer-events: none; }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="header">
  <h1>톡톡 담다 💬</h1>
  <span>익명 상담 게시판</span>
</div>

<div class="container">

  <button class="write-btn" onclick="toggleForm()">✏️ 글 남기기</button>

  <!-- 글쓰기 폼 -->
  <div class="form-card" id="formCard">
    <h2>새 글 작성</h2>
    <div class="form-row">
      <label>제목</label>
      <input type="text" id="inputTitle" placeholder="제목을 입력하세요" maxlength="50">
    </div>
    <div class="form-row">
      <label>내용</label>
      <textarea id="inputContent" placeholder="고민이나 문의 내용을 자유롭게 적어주세요"></textarea>
    </div>
    <div class="form-row">
      <label>글쓴이 (선택)</label>
      <input type="text" id="inputAuthor" placeholder="닉네임 또는 비워두기" maxlength="20">
    </div>
    <div class="form-row">
      <label>비밀번호</label>
      <input type="password" id="inputPassword" placeholder="나중에 글을 확인할 때 필요해요" maxlength="20">
      <p class="form-hint">비밀번호를 설정하면 본인만 내용을 볼 수 있어요</p>
    </div>
    <div class="form-actions">
      <button class="btn-cancel" onclick="toggleForm()">취소</button>
      <button class="btn-submit" onclick="submitPost()">등록하기</button>
    </div>
  </div>

  <!-- 글 목록 -->
  <div class="list-header">
    <span id="postCount">불러오는 중...</span>
    <span onclick="loadPosts()" style="cursor:pointer; color:#aaa;">새로고침 ↻</span>
  </div>
  <div class="post-list" id="postList">
    <div class="loading">글 목록을 불러오는 중이에요...</div>
  </div>

</div>

<!-- 비밀번호 확인 모달 -->
<div class="modal-backdrop" id="pwBackdrop" style="display:none" onclick="closePwModal(event)">
  <div class="pw-prompt" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <h3>🔒 비밀글입니다</h3>
    <p>작성 시 설정한 비밀번호를 입력해주세요</p>
    <input type="password" id="pwInput" placeholder="비밀번호" onkeydown="if(event.key==='Enter')confirmPassword()">
    <p class="pw-error" id="pwError">비밀번호가 맞지 않아요</p>
    <div class="pw-actions">
      <button class="btn-cancel" onclick="closePwModal()">취소</button>
      <button class="btn-confirm" onclick="confirmPassword()">확인</button>
    </div>
  </div>
</div>

<!-- 글 보기 모달 -->
<div class="modal-backdrop" id="viewBackdrop" style="display:none" onclick="closeViewModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <div id="modalContent"></div>
    <button class="modal-close" onclick="closeViewModal()">닫기</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// =============================================
// 설정: 여기만 바꾸면 돼요
// =============================================
const SHEET_ID = 'https://docs.google.com/spreadsheets/d/1vIs8i5m0PPmYMtp-2LdA3ZjFPJsOpZZfX72cmOi7ZQM/edit?usp=sharing';        // Google Sheet ID로 교체
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyA_e9kZFoSi4SyvzcEXbayumtho4tirkUMJWNdQtvsv-Wa8pURfKxulaiAWH_C8iv6/exec';  // Apps Script 웹앱 URL로 교체
// =============================================

let posts = [];
let pendingPost = null;

async function loadPosts() {
  try {
    const res = await fetch(`${APPS_SCRIPT_URL}?action=list`);
    const data = await res.json();
    posts = data.posts || [];
    renderList();
  } catch(e) {
    document.getElementById('postList').innerHTML = '<div class="empty">글을 불러오지 못했어요. 잠시 후 다시 시도해주세요.</div>';
    document.getElementById('postCount').textContent = '';
  }
}

function renderList() {
  const list = document.getElementById('postList');
  const count = document.getElementById('postCount');
  count.textContent = `총 ${posts.length}개의 글`;

  if(posts.length === 0) {
    list.innerHTML = '<div class="empty">아직 작성된 글이 없어요.<br>첫 번째 글을 남겨보세요 🌿</div>';
    return;
  }

  list.innerHTML = posts.map((p, i) => `
    <div class="post-item" onclick="handlePostClick(${i})">
      <div class="post-item-top">
        <span class="post-num">${posts.length - i}</span>
        ${p.hasPassword ? '<span class="post-secret">🔒 비밀글</span>' : ''}
        <span class="post-title">${escHtml(p.title)}</span>
        ${p.reply ? '<span class="has-reply">답변완료</span>' : ''}
      </div>
      <div class="post-meta">
        <span>${escHtml(p.author || '익명')}</span>
        <span>${p.date}</span>
      </div>
    </div>
  `).join('');
}

function handlePostClick(idx) {
  const post = posts[idx];
  if(post.hasPassword) {
    pendingPost = idx;
    document.getElementById('pwInput').value = '';
    document.getElementById('pwError').style.display = 'none';
    document.getElementById('pwBackdrop').style.display = 'flex';
    setTimeout(() => document.getElementById('pwInput').focus(), 100);
  } else {
    openViewModal(post);
  }
}

async function confirmPassword() {
  const pw = document.getElementById('pwInput').value;
  if(!pw) return;
  const post = posts[pendingPost];
  try {
    const res = await fetch(`${APPS_SCRIPT_URL}?action=view&id=${post.id}&pw=${encodeURIComponent(pw)}`);
    const data = await res.json();
    if(data.ok) {
      closePwModal();
      openViewModal(data.post);
    } else {
      document.getElementById('pwError').style.display = 'block';
    }
  } catch(e) {
    showToast('오류가 발생했어요');
  }
}

function openViewModal(post) {
  const content = document.getElementById('modalContent');
  content.innerHTML = `
    <h3>${escHtml(post.title)}</h3>
    <p class="modal-meta">${escHtml(post.author || '익명')} · ${post.date}</p>
    <div class="modal-body">${escHtml(post.content)}</div>
    ${post.reply ? `
      <div class="reply-box">
        <div class="reply-label">💚 답변</div>
        <div class="reply-text">${escHtml(post.reply)}</div>
      </div>
    ` : '<p style="font-size:0.82rem;color:#bbb;margin-bottom:0.5rem">아직 답변이 달리지 않았어요</p>'}
  `;
  document.getElementById('viewBackdrop').style.display = 'flex';
}

function toggleForm() {
  const card = document.getElementById('formCard');
  card.classList.toggle('open');
  if(card.classList.contains('open')) {
    card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
}

async function submitPost() {
  const title = document.getElementById('inputTitle').value.trim();
  const content = document.getElementById('inputContent').value.trim();
  const author = document.getElementById('inputAuthor').value.trim();
  const password = document.getElementById('inputPassword').value;

  if(!title) { showToast('제목을 입력해주세요'); return; }
  if(!content) { showToast('내용을 입력해주세요'); return; }

  const btn = document.querySelector('.btn-submit');
  btn.textContent = '등록 중...';
  btn.disabled = true;

  try {
    const res = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'write', title, content, author, password })
    });
    const data = await res.json();
    if(data.ok) {
      showToast('글이 등록되었어요 🌿');
      document.getElementById('inputTitle').value = '';
      document.getElementById('inputContent').value = '';
      document.getElementById('inputAuthor').value = '';
      document.getElementById('inputPassword').value = '';
      document.getElementById('formCard').classList.remove('open');
      loadPosts();
    } else {
      showToast('등록에 실패했어요. 다시 시도해주세요');
    }
  } catch(e) {
    showToast('오류가 발생했어요');
  } finally {
    btn.textContent = '등록하기';
    btn.disabled = false;
  }
}

function closePwModal(e) {
  if(!e || e.target === document.getElementById('pwBackdrop')) {
    document.getElementById('pwBackdrop').style.display = 'none';
  }
}
function closeViewModal(e) {
  if(!e || e.target === document.getElementById('viewBackdrop')) {
    document.getElementById('viewBackdrop').style.display = 'none';
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function escHtml(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

loadPosts();
</script>
</body>
</html>
